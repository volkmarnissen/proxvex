<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ohnewarum.de</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --dark: #1a1410;
    --gold: #b8965a;
    --gold-light: #d4b07a;
    --rose-shadow: rgba(180, 140, 100, 0.15);
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden auto;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.6;
  }

  /* Radial warm glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(100, 70, 30, 0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 0;
    max-width: 960px;
    width: 90vw;
    min-height: 80vh;
  }

  /* Rose side */
  .rose-side {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 40px;
    opacity: 0;
    animation: fadeSlideLeft 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards;
  }

  .rose-img {
    width: clamp(220px, 35vw, 380px);
    max-height: 60vh;
    object-fit: contain;
    height: auto;
    filter: drop-shadow(0 0 40px rgba(184, 150, 90, 0.25)) drop-shadow(0 20px 60px rgba(0,0,0,0.6));
    mix-blend-mode: normal;
  }

  /* Thin vertical divider */
  .divider {
    width: 1px;
    height: 50vh;
    background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
    opacity: 0;
    animation: fadeIn 2s ease 1.2s forwards;
    align-self: center;
  }

  /* Text side */
  .text-side {
    padding-left: 40px;
    opacity: 0;
    animation: fadeSlideRight 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s forwards;
  }

  .site-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0.8;
  }

  .quote-wrapper {
    position: relative;
    margin-bottom: 2.5rem;
  }

  /* Large decorative opening quote */
  .quote-wrapper::before {
    content: '„';
    position: absolute;
    top: -0.3em;
    left: -0.4em;
    font-family: 'Cormorant Garamond', serif;
    font-size: 5em;
    color: var(--gold);
    opacity: 0.25;
    line-height: 1;
    pointer-events: none;
  }

  .quote-line {
    font-size: clamp(1.5rem, 2.8vw, 2.2rem);
    font-weight: 300;
    line-height: 1.5;
    letter-spacing: 0.02em;
    color: var(--cream);
  }

  .quote-line em {
    font-style: italic;
    color: var(--gold-light);
  }

  .attribution {
    font-size: clamp(0.75rem, 1vw, 0.88rem);
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
    margin-top: 1.8rem;
  }

  .nav-bar {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(184, 150, 90, 0.2);
    display: flex;
    gap: 1.8rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeIn 1.5s ease 2.2s forwards;
  }

  .nav-bar a {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 0.9vw, 0.72rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.55;
    text-decoration: none;
    transition: opacity 0.3s;
  }

  .nav-bar a:hover {
    opacity: 1;
  }

  .nav-bar .disabled {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 0.9vw, 0.72rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.25;
    cursor: default;
  }

  /* Thin decorative line under site name */
  .site-name-bar {
    display: block;
    width: 2rem;
    height: 1px;
    background: var(--gold);
    margin-bottom: 2.5rem;
    opacity: 0.5;
  }

  @keyframes fadeSlideLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeSlideRight {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 640px) {
    body { overflow-y: auto; }
    .container {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      gap: 2rem;
      text-align: center;
      padding: 3rem 1.5rem;
      min-height: unset;
    }
    .rose-side {
      justify-content: center;
      padding-right: 0;
    }
    .divider { display: none; }
    .text-side { padding-left: 0; }
    .quote-wrapper::before { left: 50%; transform: translateX(-50%); }
    .site-name-bar { margin-left: auto; margin-right: auto; }
    .nav-bar { justify-content: center; }
  }
</style>
</head>
