name: Livetest (non-blocking)

# Runs the full live integration suite against a self-hosted runner on
# ubuntupve. Intentionally non-blocking so PRs can merge even when the
# runner is offline (skipped) or when tests fail (continue-on-error).
#
# Triggers:
#   - pull_request: on changes to code paths that could affect runtime behaviour
#   - workflow_dispatch: manual run from the GitHub UI (branch picker is
#                        provided by GitHub natively; choose branch + optional
#                        test filter and click "Run workflow")

on:
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - json/**
      - e2e/**
      - install-proxvex.sh
      - scripts/**
      - docker/**
      - .github/workflows/livetest-on-pr.yml
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g. postgres/default, zitadel, --all)'
        type: string
        required: false
        default: --all

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  check-runner:
    runs-on: ubuntu-latest
    environment: livetest
    outputs:
      runner_online: ${{ steps.probe.outputs.runner_online }}
    steps:
      - name: Probe self-hosted runner status
        id: probe
        # RUNNER_CHECK_PAT: fine-grained PAT with "Administration: Read" on the
        # repo. The auto-issued GITHUB_TOKEN cannot list runners (Administration
        # scope is not grantable via `permissions:`), hence a separate secret.
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RUNNER_CHECK_PAT secret not set — livetest will be skipped."
            echo "runner_online=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! response=$(gh api "/repos/${{ github.repository }}/actions/runners" --paginate 2>&1); then
            echo "gh api call failed: $response"
            echo "runner_online=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(printf '%s' "$response" | jq '[.runners[]
                   | select(.status == "online")
                   | select(.labels[].name == "ubuntupve")] | length')
          echo "Online ubuntupve runners: $count"
          if [ "${count:-0}" -gt 0 ]; then
            echo "runner_online=true" >> "$GITHUB_OUTPUT"
          else
            echo "runner_online=false" >> "$GITHUB_OUTPUT"
          fi

  # Compute the affected-tests filter from the diff + PR body. In shadow-mode
  # the output is informational only (rendered into the job summary). After a
  # validation period this job's output will gate the `livetest` job (separate
  # cutover PR).
  compute-affected:
    runs-on: ubuntu-latest
    needs: check-runner
    if: needs.check-runner.outputs.runner_online == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      skip: ${{ steps.compute.outputs.skip }}
      filter: ${{ steps.compute.outputs.filter }}
      directive_used: ${{ steps.compute.outputs.directive_used }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: 'blob:none'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Compute affected tests
        id: compute
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          LOG_LEVEL: error
        run: |
          set -e
          # workflow_dispatch with explicit filter bypasses compute.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.test_filter }}" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "filter=${{ inputs.test_filter }}" >> "$GITHUB_OUTPUT"
            echo "directive_used=manual-dispatch" >> "$GITHUB_OUTPUT"
            {
              echo "## Affected-Tests Compute (workflow_dispatch)";
              echo "";
              echo "**Filter:** \`${{ inputs.test_filter }}\`";
              echo "**Skip:** false";
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/changed.txt
          printf '%s' "$PR_BODY" > /tmp/body.md

          npx tsx backend/tests/livetests/src/compute-affected-tests.mts \
            --diff /tmp/changed.txt \
            --pr-body /tmp/body.md \
            --out /tmp/result.json \
            --summary-out /tmp/compute-summary.md

          cat /tmp/compute-summary.md >> "$GITHUB_STEP_SUMMARY"

          jq -r '.reasons[]?'  /tmp/result.json | sed 's/^/::notice::compute: /' || true
          jq -r '.warnings[]?' /tmp/result.json | sed 's/^/::warning::compute: /' || true

          echo "skip=$(jq -r '.skip'   /tmp/result.json)"   >> "$GITHUB_OUTPUT"
          echo "filter=$(jq -r '.filter' /tmp/result.json)" >> "$GITHUB_OUTPUT"
          echo "directive_used=$(jq -r '.directiveUsed' /tmp/result.json)" >> "$GITHUB_OUTPUT"

  livetest:
    needs: [check-runner, compute-affected]
    # SHADOW-MODE: still bound only to check-runner. Filter forced to --all.
    # The compute-affected job runs in parallel and renders its decision into
    # the job summary; nothing on the livetest job depends on its outputs yet.
    # Cutover (later PR) will switch to:
    #   if: needs.check-runner.outputs.runner_online == 'true' && needs.compute-affected.outputs.skip != 'true'
    #   FILTER from needs.compute-affected.outputs.filter
    if: needs.check-runner.outputs.runner_online == 'true'
    runs-on: [self-hosted, linux, ubuntupve]
    environment: livetest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Materialize e2e/config.json from secret
        env:
          E2E_CONFIG: ${{ secrets.E2E_CONFIG }}
        run: |
          if [ -z "$E2E_CONFIG" ]; then
            echo "::error::Missing GitHub secret E2E_CONFIG (full e2e/config.json content)"
            exit 1
          fi
          printf '%s' "$E2E_CONFIG" > e2e/config.json
          jq -e '.instances["github-action"]' e2e/config.json >/dev/null \
            || { echo "::error::E2E_CONFIG does not contain a github-action instance"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install deployer (step2b on mirrors-ready)
        run: ./e2e/step2b-install-deployer.sh github-action

      - name: Run livetests
        run: |
          FILTER="${{ github.event_name == 'workflow_dispatch' && inputs.test_filter || '--all' }}"
          npx tsx backend/tests/livetests/src/live-test-runner.mts github-action "$FILTER"

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livetest-diagnostics-${{ github.run_id }}
          path: |
            /tmp/livetest-*.tar.gz
            .livetest-data/**/*.log
          if-no-files-found: ignore
          retention-days: 7
