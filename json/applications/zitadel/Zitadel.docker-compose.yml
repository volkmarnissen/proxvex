services:
  traefik:
    image: traefik:${DOCKER_traefik_TAG}
    restart: unless-stopped
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:8080"
      - "--log.level=INFO"
    ports:
      - "8080:8080"
    configs:
      - source: traefik-dynamic-http
        target: /etc/traefik/dynamic.yml
    networks:
      - zitadel

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${DOCKER_zitadel_TAG}
    restart: unless-stopped
    command: 'start-from-init --masterkey "{{ ZITADEL_MASTERKEY }}" --tlsMode disabled'
    environment:
      ZITADEL_EXTERNALDOMAIN: "{{ ZITADEL_EXTERNALDOMAIN }}"
      ZITADEL_EXTERNALSECURE: "{{ ZITADEL_EXTERNALSECURE }}"
      ZITADEL_EXTERNALPORT: "{{ ZITADEL_EXTERNALPORT }}"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: "{{ POSTGRES_HOST }}"
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: "{{ ZITADEL_DB_PASSWORD }}"
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: "{{ POSTGRES_PASSWORD }}"
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "{{ ZITADEL_PUBLIC_BASE_URL }}/ui/v2/login/"
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "{{ ZITADEL_PUBLIC_BASE_URL }}/ui/v2/login/login?authRequest="
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "{{ ZITADEL_PUBLIC_BASE_URL }}/ui/v2/login/logout?post_logout_redirect="
      ZITADEL_SAML_DEFAULTLOGINURLV2: "{{ ZITADEL_PUBLIC_BASE_URL }}/ui/v2/login/login?samlRequest="
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: admin-client
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin Client
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "{{ ZITADEL_ADMIN_PASSWORD }}!Aa1"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: User
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL: "admin@{{ ZITADEL_EXTERNALDOMAIN }}"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PREFERREDLANGUAGE: en
      # --- Optional: pre-configure SMTP at FirstInstance init ---
      # These values come from the oidc stack (SMTP_HOST, SMTP_USER, ...).
      # If the stack leaves them empty, Zitadel treats them as unset and
      # the admin can configure SMTP later via the UI.
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: "{{ SMTP_HOST }}:{{ SMTP_PORT }}"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: "{{ SMTP_USER }}"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: "{{ SMTP_PASSWORD }}"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: "true"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: "{{ SMTP_SENDER }}"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: Zitadel
    volumes:
      - /bootstrap:/zitadel/bootstrap
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 300s
    networks:
      - zitadel

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${DOCKER_zitadel_login_TAG}
    restart: unless-stopped
    group_add:
      - "1001"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      CUSTOM_REQUEST_HEADERS: "Host:{{ ZITADEL_EXTERNALDOMAIN }},X-Forwarded-Proto:{{ ZITADEL_FORWARDED_PROTO }}"
    volumes:
      - /bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
    networks:
      - zitadel

configs:
  traefik-dynamic-http:
    content: |
      http:
        middlewares:
          zitadel-host:
            headers:
              customRequestHeaders:
                Host: "{{ ZITADEL_EXTERNALDOMAIN }}"
        routers:
          zitadel-login:
            rule: "PathPrefix(`/ui/v2/login`)"
            service: zitadel-login
            priority: 250
            entryPoints:
              - web
          zitadel-api:
            rule: "PathPrefix(`/`)"
            service: zitadel-api
            middlewares:
              - zitadel-host
            priority: 100
            entryPoints:
              - web
        services:
          zitadel-api:
            loadBalancer:
              servers:
                - url: "h2c://zitadel-api:8080"
          zitadel-login:
            loadBalancer:
              servers:
                - url: "http://zitadel-login:3000"
  traefik-dynamic-https:
    content: |
      tls:
        certificates:
          - certFile: /certs/fullchain.pem
            keyFile: /certs/privkey.pem
      http:
        middlewares:
          zitadel-host:
            headers:
              customRequestHeaders:
                Host: "{{ ZITADEL_EXTERNALDOMAIN }}"
        routers:
          zitadel-login:
            rule: "PathPrefix(`/ui/v2/login`)"
            service: zitadel-login
            priority: 250
            entryPoints:
              - websecure
            tls: {}
          zitadel-api:
            rule: "PathPrefix(`/`)"
            service: zitadel-api
            middlewares:
              - zitadel-host
            priority: 100
            entryPoints:
              - websecure
            tls: {}
        services:
          zitadel-api:
            loadBalancer:
              servers:
                - url: "h2c://zitadel-api:8080"
          zitadel-login:
            loadBalancer:
              servers:
                - url: "http://zitadel-login:3000"

networks:
  zitadel:
